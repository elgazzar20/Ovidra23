<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients matching the user's high-quality logo -->
    <!-- Gradient 1: Purple to deep blue/violet (Left to bottom lobe) -->
    <linearGradient id="purple-grad" x1="15%" y1="15%" x2="85%" y2="85%">
      <stop offset="0%" stop-color="#b06bf2" />
      <stop offset="50%" stop-color="#703bf7" />
      <stop offset="100%" stop-color="#3024c0" />
    </linearGradient>

    <!-- Gradient 2: Cyan to bright blue (Top to right lobe) -->
    <linearGradient id="cyan-grad" x1="10%" y1="90%" x2="90%" y2="10%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="60%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>

    <!-- Gradient 3: Deep blue to purple/magenta (Bottom to left transition) -->
    <linearGradient id="blue-grad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="40%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>

    <!-- Highlights and Glows -->
    <linearGradient id="light-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <!-- Shadow filter for 3D depth and interlocking overlap -->
    <filter id="shadow-depth" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="-2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25" />
    </filter>
    <filter id="inner-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#090530" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background container to center and scale -->
  <g transform="translate(0, 0)">
    <!-- Leaf 1: The Cyan/Blue upper-right loop -->
    <path d="M 256,60 
             C 340,60 440,140 440,240 
             C 440,300 400,350 340,380 
             C 290,405 240,340 220,310 
             C 200,280 180,240 210,180 
             C 230,140 256,120 256,60 Z" 
          fill="url(#cyan-grad)" 
          filter="url(#shadow-depth)" />

    <!-- Leaf 2: The Purple/Violet left loop -->
    <path d="M 120,380 
             C 60,320 60,180 140,120 
             C 190,82 250,90 290,140 
             C 322,180 300,240 280,280 
             C 260,320 220,380 160,410 
             C 140,420 120,380 120,380 Z" 
          fill="url(#purple-grad)" 
          filter="url(#shadow-depth)" />

    <!-- Leaf 3: The Deep Blue bottom loop -->
    <path d="M 380,360 
             C 410,410 320,460 256,460 
             C 180,460 110,410 110,330 
             C 110,270 160,240 210,210 
             C 260,180 320,180 340,240 
             C 360,300 380,310 380,360 Z" 
          fill="url(#blue-grad)" 
          filter="url(#shadow-depth)" />

    <!-- Overlapping Connection Highlight / Blend to complete the Mobius strip seamlessly -->
    <!-- This small overlap ensures the "looping" looks realistic and interlocking -->
    <path d="M 210,180 
             C 230,140 256,120 256,60
             C 270,60 290,80 300,110
             C 270,140 240,170 210,180 Z" 
          fill="url(#cyan-grad)" 
          opacity="0.95" />
          
    <path d="M 280,280 
             C 260,320 220,380 160,410
             C 150,400 140,380 140,360
             C 190,330 240,310 280,280 Z" 
          fill="url(#purple-grad)" 
          opacity="0.95" />

    <!-- Subtle glossy highlight layer -->
    <path d="M 256,65 
             C 330,65 420,135 430,220 
             C 410,160 340,100 256,85 Z" 
          fill="url(#light-glow)" />
  </g>
</svg>
